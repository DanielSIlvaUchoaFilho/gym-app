version: '3.8'

services:
  db:
    image: postgres:18.4
    container_name: gym-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gym_app_db}
      POSTGRES_USER: ${POSTGRES_USERNAME:-postgres_adm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - gym-app-postgres-and-pgadmin
    volumes:
      - gym-app:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4:9.15
    container_name: gym-app-pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-adm@gmail.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-123}
    ports:
      - "${PGADMIN_PORT:-15432}:80"
    networks:
      - gym-app-postgres-and-pgadmin
    depends_on:
      - db

networks:
  gym-app-postgres-and-pgadmin:
    driver: bridge

volumes:
  gym-app: