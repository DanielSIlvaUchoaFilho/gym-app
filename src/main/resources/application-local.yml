spring:
    datasource:
        url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/gym_app_db}
        username: ${POSTGRES_USERNAME:postgres_adm}
        password: ${POSTGRES_PASSWORD:123}
    
    jpa:
        hibernate:
            ddl-auto: none

        open-in-view: false

        show-sql: true

        properties:
            hibernate:
                format_1sql: true